<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Escape - Experiencia Inmersiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Variables de color para cambiar todo rápido */
        :root {
            --primary-color: #ff003c; /* Un rojo neón potente */
            --accent-color: #00f2ff;  /* Cian para detalles */
            --bg-overlay: rgba(0, 0, 0, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* HERO SECTION DINÁMICA */
        .hero {
            height: 100vh;
            width: 100%;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        background: url('./Sfondo_home.png') no-repeat center center / cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        /* NAVEGACIÓN ESTILO CRISTAL */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 10px 50px; /* Ridotto il padding verticale per compensare la grandezza del logo */
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    background: rgba(0, 0, 0, 0.6); /* Un po' più scura per far risaltare il logo */
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.logo-container img {
    height: 120px; /* Prima era 80px */
    width: auto;
    filter: drop-shadow(0 0 15px var(--primary-color));
    transition: transform 0.3s ease;
    display: block;
}

.logo-container img:hover {
    transform: scale(1.05); /* Leggero effetto ingrandimento al passaggio del mouse */
}

        /* MENU A TENDINA MEJORADO */
    /* MENU A TENDINA MIGLIORATO */
.dropdown { 
    position: relative; 
    display: inline-block;
}

.dropbtn {
    background: transparent;
    color: white;
    padding: 10px 25px;
    font-size: 18px;
    font-family: 'Orbitron', sans-serif;
    border: 2px solid var(--primary-color);
    cursor: pointer;
    transition: 0.3s;
    /* Rimuoviamo il clip-path se ti dava problemi di clic, usiamo un bordo classico */
    text-transform: uppercase;
}

.dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    background: rgba(0, 0, 0, 0.95);
    min-width: 250px;
    border: 1px solid var(--primary-color);
    z-index: 1000;
    
    /* TRUCCO: Questo margine superiore negativo e il padding 
       creano un "ponte" invisibile così il menu non si chiude */
    margin-top: 0; 
    padding-top: 10px; 
}

/* Mostra il menu sia quando passi sopra il tasto, sia quando sei sopra il contenuto */
.dropdown:hover .dropdown-content { 
    display: block; 
}

.dropdown-content a {
    color: white;
    padding: 15px;
    text-decoration: none;
    display: block;
    font-weight: bold;
    font-family: 'Rajdhani', sans-serif;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    transition: 0.3s;
    background: black; /* Sfondo solido per i link */
}

.dropdown-content a:hover {
    background: var(--primary-color);
    color: white;
    padding-left: 30px; /* Effetto movimento al passaggio */
}
        /* TEXTOS CENTRALES */
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem); /* Tamaño fluido */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px var(--primary-color);
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 40px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        /* BOTÓN DINÁMICO */
        .btn-cta {
            padding: 20px 50px;
            background: transparent;
            color: white;
            border: 2px solid white;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            position: relative;
            transition: 0.4s;
            overflow: hidden;
        }

        .btn-cta:hover {
            background: white;
            color: black;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
        }

        /* Animación suave al cargar */
        .hero * {
            animation: fadeInUp 1s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <a href="index.html">
                <img src="Logo.png" alt="Arena Logo">
            </a>
        </div>
        
        <div class="dropdown">
            <button class="dropbtn">MISIONES ▼</button>
            <div class="dropdown-content">
                <a href="Arena51.html">Arena 51</a>
                <a href="ElBunker21.html">El Búnker 21</a>
                <a href="ElCasoDylan.html">El Caso Dylan</a>
                <a href="ElSilencioAlmeria.html">El Silencio</a>
                <a href="LallaveGranada.html">La Llave Granada</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <h1 class="logo-text">ARENA ESCAPE</h1>
        <p class="subtitle">¡EL NIVEL PRO HA SIDO DESBLOQUEADO!</p>
        <a href="#misiones" class="btn-cta">RESERVA TU MISIÓN</a>
    </div>

</body>
</html>
