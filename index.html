<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Escape - Experiencia Inmersiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #a4e5f5; 
            --accent-color: #00f2ff;  
            --bg-overlay: rgba(0, 0, 0, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .hero {
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('Sfondo.png') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 10px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container img {
            height: 120px;
            width: auto;
            filter: drop-shadow(0 0 15px var(--primary-color));
            transition: transform 0.3s ease;
            display: block;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color);
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 50px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        /* --- NUOVO SELETTORE ORIZZONTALE --- */
        .mission-selector {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
            animation: fadeInUp 1.2s ease forwards;
        }

        .mission-card {
            text-decoration: none;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            overflow: hidden;
            /* Angolo tagliato stile sci-fi */
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
        }

        /* Effetto bordo neon al passaggio */
        .mission-card:hover {
            background: rgba(255, 0, 60, 0.1);
            border-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.4);
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        /* Decorazione interna (linea hi-tech) */
        .mission-card::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary-color);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .mission-card:hover::after {
            transform: scaleX(1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive per cellulari */
        @media (max-width: 768px) {
            .mission-selector { gap: 10px; }
            .mission-card { padding: 12px 18px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <a href="index.html">
                <img src="logoarenagaming.png" alt="Arena Logo">
            </a>
        </div>
    </nav>

    <div class="hero">
        <h1 class="logo-text">ARENA GAMING</h1>
        <h2 class="logo-text">-ESCAPE ROOMS-</h2>
        <p class="subtitle">SELECCIONA TU MISIÓN</p>
        
        <div class="mission-selector">
            <a href="Arena51.html" class="mission-card">Arena 51</a>
            <a href="ElBunker21.html" class="mission-card">El Búnker 21</a>
            <a href="ElCasoDylan.html" class="mission-card">El Caso Dylan</a>
            <a href="ElSilencioAlmeria.html" class="mission-card">El Silencio</a>
            <a href="LallaveGranada.html" class="mission-card">La Llave Granada</a>
        </div>
    </div>

</body>
</html>
